name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (reads rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          # setup-rust-toolchain auto-runs Swatinem/rust-cache with
          # cache-targets: true. We disable it here so our explicit step
          # below is authoritative — otherwise target/ gets restored before
          # we can opt out, libinjectivetesttube.so is Fresh, and linking
          # the integration test fails to find libwasmvm.x86_64.so.
          cache: false

      - name: Cache cargo registry (not target/)
        uses: Swatinem/rust-cache@v2
        with:
          # injective-test-tube's build.rs runs `go build -buildmode=c-shared`
          # to produce libinjectivetesttube.so, which has a NEEDED dep on
          # libwasmvm.x86_64.so found only via Go's pkg cache at build time.
          # Caching target/ makes Cargo mark the crate "Fresh" and skip the
          # Go build; rustc then fails to relink because libwasmvm isn't in
          # the search path. Keep registry+git caches; force a fresh target.
          cache-targets: false

      - name: Unit tests
        run: cargo test --lib --verbose

      - name: Integration tests (injective-test-tube)
        run: cargo test --test integration --verbose

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (reads rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings
